# Tuning profile for the Dungeons & Dragons Rules Cyclopedia (TSR, 1991).
#
# This PDF is widely and legally available, so this profile should work for
# anyone converting the same book. Used via:  pdfmd book.pdf --tuning rules-cyclopedia
#
# Chapter titles/pages are transcribed from the book's own Table of Contents.
# `page` is the PRINTED page number. `page_offset` maps printed -> physical PDF
# page for later chapter-splitting (option B); it is NOT needed for the option-A
# passes here (chapter headings are matched by title text, and page anchors use
# physical page numbers directly), so it is left at a best-guess pending calibration.

[book]
name   = "D&D Rules Cyclopedia"
detect = ["Rules Cyclopedia", "Dungeons & Dragons Rules Cyclopedia"]
page_offset = 0

[[chapters]]
title = "Chapter 1: Steps in Character Creation"
page  = 6
[[chapters]]
title = "Chapter 2: The Character Classes"
page  = 13
[[chapters]]
title = "Chapter 3: Spells and Spellcasting"
page  = 32
